<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BackUp Buddy — A Different Kind of Walk</title>
  <style>
    :root{--font-display:'Georgia',serif;--font-body:-apple-system,'Segoe UI',sans-serif;--text-xs:.75rem;--text-sm:.875rem;--text-base:1rem;--text-lg:1.125rem;--text-xl:1.25rem;--text-2xl:1.5rem;--text-3xl:1.875rem;--text-4xl:2.25rem;--text-5xl:3rem;--font-weight-normal:400;--font-weight-medium:500;--font-weight-semibold:600;--font-weight-bold:700;--radius-sm:.375rem;--radius-md:.75rem;--radius-lg:1.25rem;--radius-xl:2rem;--transition-fast:120ms ease;--transition-interactive:200ms cubic-bezier(.4,0,.2,1);--transition-slow:400ms ease}
    [data-theme="light"]{--color-bg:#f9f7f4;--color-bg-alt:#f0ede8;--color-bg-card:#ffffff;--color-text:#1a1714;--color-text-secondary:#5c574f;--color-text-tertiary:#8a8379;--color-text-inverse:#ffffff;--color-primary:#2d7d6f;--color-primary-hover:#236358;--color-accent:#c4622d;--color-border:#ddd8d0;--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.12)}
    [data-theme="dark"]{--color-bg:#141210;--color-bg-alt:#1e1b18;--color-bg-card:#242019;--color-text:#f0ede8;--color-text-secondary:#b5b0a7;--color-text-tertiary:#7d786f;--color-text-inverse:#141210;--color-primary:#3d9e8e;--color-primary-hover:#4db8a6;--color-accent:#d97b4a;--color-border:#2e2b27;--shadow-sm:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 16px rgba(0,0,0,.4);--shadow-lg:0 8px 32px rgba(0,0,0,.5)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{line-height:1.68;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg)} img,svg{display:block;max-width:100%;height:auto} a,button{transition:color var(--transition-interactive),background var(--transition-interactive),border-color var(--transition-interactive),box-shadow var(--transition-interactive),transform var(--transition-interactive)} a{text-decoration:none;color:inherit} button{cursor:pointer;border:none;background:none} h1,h2,h3{text-wrap:balance;line-height:1.06} p{text-wrap:pretty;max-width:70ch} :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}
  </style>
</head>

</html>
